<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>🐰 いろまと！</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body {
  background:#1a0a2e; font-family:'Hiragino Maru Gothic Pro','BIZ UDPGothic',sans-serif;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  min-height:100dvh; overflow:hidden; user-select:none; -webkit-user-select:none;
}
#wrap { position:relative; width:360px; max-width:100vw; background:#1a0a2e; border-radius:14px; }
#hud {
  display:flex; justify-content:space-between; align-items:center;
  padding:7px 10px; background:#2a1248; border-radius:14px 14px 0 0; color:#fff;
}
#hud-left { font-size:17px; font-weight:bold; color:#ffd6f0; }
#hud-mid { display:flex; align-items:center; gap:6px; }
#hud-right { display:flex; align-items:center; gap:5px; }
#level-badge { background:linear-gradient(135deg,#e040fb,#7c4dff); border-radius:20px; padding:2px 9px; font-size:10px; font-weight:bold; color:#fff; }
#diff-badge  { border-radius:20px; padding:2px 8px; font-size:10px; font-weight:bold; color:#fff; background:#2ecc71; transition:background .5s; }
#sound-btn   { background:rgba(255,255,255,.12); border:none; border-radius:50%; width:26px; height:26px; color:#fff; font-size:13px; cursor:pointer; }
#lives-canvas { display:block; }
#game-canvas { display:block; width:360px; max-width:100vw; }
#target-bar { background:#2a1248; border-radius:0 0 14px 14px; padding:9px 12px; text-align:center; color:#fff; }
#target-label { font-size:11px; color:#c9b8ff; margin-bottom:3px; }
#target-name  { font-size:22px; font-weight:bold; letter-spacing:2px; color:#fff; text-shadow:0 0 12px rgba(255,200,255,.8); }
#swatch { display:inline-block; width:22px; height:22px; border-radius:50%; border:3px solid rgba(255,255,255,.4); vertical-align:middle; margin-right:8px; }
#skill-bar-wrap { background:#221040; }
#overlay {
  position:absolute; top:0; left:0; right:0; bottom:0;
  display:flex; flex-direction:column; align-items:center; justify-content:center;
  background:rgba(26,10,46,.93); border-radius:14px; z-index:100;
  padding:20px; text-align:center; color:#fff; overflow-y:auto;
}
#overlay h1 { font-size:24px; margin-bottom:6px; }
#overlay p  { font-size:12px; color:#c9b8ff; line-height:1.7; margin-bottom:12px; }
.btn { background:linear-gradient(135deg,#e040fb,#7c4dff); color:#fff; border:none; border-radius:30px; padding:11px 32px; font-size:15px; font-weight:bold; cursor:pointer; margin:5px; font-family:inherit; }
.btn.sec { background:rgba(255,255,255,.12); font-size:13px; padding:9px 22px; }
#lv-sel { display:flex; gap:7px; flex-wrap:wrap; justify-content:center; margin-bottom:12px; }
#lv-sel button { background:rgba(255,255,255,.1); border:2px solid rgba(255,255,255,.2); border-radius:20px; color:#fff; padding:7px 14px; font-size:12px; cursor:pointer; font-family:inherit; }
#lv-sel button.on { background:linear-gradient(135deg,#e040fb,#7c4dff); border-color:transparent; font-weight:bold; }
#char-sel { display:flex; gap:16px; justify-content:center; margin-bottom:12px; }
.cbtn { background:rgba(255,255,255,.08); border:2px solid rgba(255,255,255,.2); border-radius:14px; color:#fff; padding:8px 14px; font-size:12px; cursor:pointer; font-family:inherit; display:flex; flex-direction:column; align-items:center; gap:4px; }
.cbtn.on { border-color:#e040fb; background:rgba(224,64,251,.2); }
.cbtn canvas { display:block; }
#lvup { position:absolute; left:50%; transform:translateX(-50%); background:linear-gradient(135deg,#FFE066,#FF9900); color:#1a0a2e; font-weight:bold; font-size:15px; border-radius:20px; padding:7px 22px; white-space:nowrap; pointer-events:none; opacity:0; transition:opacity .3s; z-index:50; top:40px; }
</style>
</head>
<body>
<div id="wrap">
  <div id="hud">
    <div id="hud-left">✨ <span id="score-val">0</span></div>
    <div id="hud-mid">
      <div id="level-badge">3級</div>
      <div id="diff-badge">Lv1</div>
    </div>
    <div id="hud-right">
      <button id="sound-btn">🔊</button>
      <span id="carrot-hud" style="font-size:12px;letter-spacing:1px;display:none;"></span>
      <canvas id="lives-canvas" width="72" height="24"></canvas>
    </div>
  </div>
  <canvas id="game-canvas" width="360" height="500"></canvas>
  <div id="lvup">⬆️ レベルアップ！</div>
  <!-- スキルゲージ（タップで発動） -->
  <div id="skill-bar" style="padding:5px 10px;background:#221040;display:flex;align-items:center;gap:8px;cursor:pointer;transition:background 0.3s;" onclick="if(state==='playing')activateSkill();">
    <span id="skill-icon" style="font-size:15px;">🌸</span>
    <div style="flex:1;">
      <div style="height:10px;background:rgba(255,255,255,0.15);border-radius:5px;overflow:hidden;">
        <div id="skill-gauge" style="height:100%;width:0%;border-radius:5px;background:linear-gradient(90deg,#F4A7B9,#e040fb);transition:width 0.2s;"></div>
      </div>
    </div>
    <span id="skill-label" style="font-size:10px;color:#c9b8ff;white-space:nowrap;">スキルゲージ</span>
  </div>
  <style>
    @keyframes skillPulse {
      0%,100%{background:rgba(224,64,251,0.15);box-shadow:0 0 0px #e040fb;}
      50%{background:rgba(224,64,251,0.35);box-shadow:0 0 14px #e040fb;}
    }
    #skill-bar.ready { animation:skillPulse 0.8s ease-in-out infinite; }
  </style>
  <div id="target-bar">
    <div id="target-label">🎯 この色を撃て！　タップで発射</div>
    <div><span id="swatch"></span><span id="target-name">－</span></div>
  </div>
  <div id="overlay"><div id="oc" style="width:100%"></div></div>
</div>
<script>
'use strict';
// ===== CANVAS DRAW RABBITS =====
// さくら（ピンク・立ち耳）をcanvasに直描き
function drawSakura(c, x, y, size) {
  const s = size / 100;
  // 全体を少し下にオフセットして耳が切れないようにする
  const oy = y + 8*s;
  // 立ち耳 左
  c.fillStyle = '#F0A0C0';
  c.beginPath(); c.ellipse(x-16*s, oy-30*s, 9*s, 22*s, -0.17, 0, Math.PI*2); c.fill();
  c.fillStyle = '#F5C8D8';
  c.beginPath(); c.ellipse(x-16*s, oy-30*s, 5*s, 16*s, -0.17, 0, Math.PI*2); c.fill();
  // 立ち耳 右
  c.fillStyle = '#F0A0C0';
  c.beginPath(); c.ellipse(x+16*s, oy-30*s, 9*s, 22*s, 0.17, 0, Math.PI*2); c.fill();
  c.fillStyle = '#F5C8D8';
  c.beginPath(); c.ellipse(x+16*s, oy-30*s, 5*s, 16*s, 0.17, 0, Math.PI*2); c.fill();
  // 顔
  c.fillStyle = '#F0A0C0';
  c.beginPath(); c.ellipse(x, oy, 30*s, 27*s, 0, 0, Math.PI*2); c.fill();
  // 口元
  c.fillStyle = '#FFF0F5';
  c.beginPath(); c.ellipse(x, oy+8*s, 15*s, 10*s, 0, 0, Math.PI*2); c.fill();
  // 目
  c.fillStyle = '#6B3060';
  c.beginPath(); c.ellipse(x-10*s, oy-4*s, 6*s, 7*s, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(x+10*s, oy-4*s, 6*s, 7*s, 0, 0, Math.PI*2); c.fill();
  c.fillStyle = 'rgba(255,255,255,0.6)';
  c.beginPath(); c.ellipse(x-8*s, oy-6*s, 2*s, 2.5*s, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(x+12*s, oy-6*s, 2*s, 2.5*s, 0, 0, Math.PI*2); c.fill();
  // 鼻
  c.fillStyle = '#B06090';
  c.beginPath(); c.ellipse(x, oy+6*s, 3.5*s, 2.5*s, 0, 0, Math.PI*2); c.fill();
  // 口
  c.strokeStyle = '#B06090'; c.lineWidth = 1.5*s; c.lineCap = 'round';
  c.beginPath(); c.moveTo(x-3*s, oy+10*s); c.quadraticCurveTo(x, oy+14*s, x+3*s, oy+10*s); c.stroke();
  // ほっぺ
  c.globalAlpha = 0.4; c.fillStyle = '#F4B8C8';
  c.beginPath(); c.ellipse(x-15*s, oy+4*s, 6*s, 3.5*s, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(x+15*s, oy+4*s, 6*s, 3.5*s, 0, 0, Math.PI*2); c.fill();
  c.globalAlpha = 1;
}

// ショコラ（チョコ・垂れ耳）をcanvasに直描き
function drawChocolat(c, x, y, size) {
  const s = size / 100;
  // 垂れ耳 左
  c.fillStyle = '#7A4018';
  c.beginPath();
  c.moveTo(x-24*s, y-14*s);
  c.bezierCurveTo(x-44*s, y-18*s, x-48*s, y+20*s, x-36*s, y+32*s);
  c.bezierCurveTo(x-24*s, y+36*s, x-16*s, y+20*s, x-16*s, y+2*s);
  c.closePath(); c.fill();
  c.fillStyle = '#C4884A';
  c.beginPath();
  c.moveTo(x-24*s, y-10*s);
  c.bezierCurveTo(x-40*s, y-14*s, c.x=x-44*s, y+18*s, x-34*s, y+28*s);
  c.bezierCurveTo(x-24*s, y+32*s, x-18*s, y+18*s, x-18*s, y+2*s);
  c.closePath(); c.fill();
  // 垂れ耳 右
  c.fillStyle = '#7A4018';
  c.beginPath();
  c.moveTo(x+24*s, y-14*s);
  c.bezierCurveTo(x+44*s, y-18*s, x+48*s, y+20*s, x+36*s, y+32*s);
  c.bezierCurveTo(x+24*s, y+36*s, x+16*s, y+20*s, x+16*s, y+2*s);
  c.closePath(); c.fill();
  c.fillStyle = '#C4884A';
  c.beginPath();
  c.moveTo(x+24*s, y-10*s);
  c.bezierCurveTo(x+40*s, y-14*s, x+44*s, y+18*s, x+34*s, y+28*s);
  c.bezierCurveTo(x+24*s, y+32*s, x+18*s, y+18*s, x+18*s, y+2*s);
  c.closePath(); c.fill();
  // 顔外枠
  c.fillStyle = '#7A4018';
  c.beginPath(); c.ellipse(x, y, 34*s, 31*s, 0, 0, Math.PI*2); c.fill();
  // 顔
  c.fillStyle = '#C4884A';
  c.beginPath(); c.ellipse(x, y-2*s, 32*s, 29*s, 0, 0, Math.PI*2); c.fill();
  // 口元
  c.fillStyle = '#DCAA74';
  c.beginPath(); c.ellipse(x, y+12*s, 16*s, 10*s, 0, 0, Math.PI*2); c.fill();
  // 目
  c.fillStyle = '#3A1A08';
  c.beginPath(); c.ellipse(x-11*s, y-4*s, 6*s, 7*s, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(x+11*s, y-4*s, 6*s, 7*s, 0, 0, Math.PI*2); c.fill();
  c.fillStyle = 'rgba(255,255,255,0.6)';
  c.beginPath(); c.ellipse(x-9*s, y-6*s, 2*s, 2.5*s, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(x+13*s, y-6*s, 2*s, 2.5*s, 0, 0, Math.PI*2); c.fill();
  // 鼻
  c.fillStyle = '#7A3A18';
  c.beginPath(); c.ellipse(x, y+8*s, 4*s, 3*s, 0, 0, Math.PI*2); c.fill();
  // 口
  c.strokeStyle = '#7A3A18'; c.lineWidth = 1.5*s; c.lineCap = 'round';
  c.beginPath(); c.moveTo(x-3*s, y+12*s); c.quadraticCurveTo(x, y+16*s, x+3*s, y+12*s); c.stroke();
  // ひげ
  c.strokeStyle = 'rgba(154,112,80,0.6)'; c.lineWidth = 1*s;
  c.beginPath(); c.moveTo(x-22*s, y+9*s); c.lineTo(x-8*s, y+10*s); c.stroke();
  c.beginPath(); c.moveTo(x-22*s, y+13*s); c.lineTo(x-8*s, y+13*s); c.stroke();
  c.beginPath(); c.moveTo(x+8*s, y+10*s); c.lineTo(x+22*s, y+9*s); c.stroke();
  c.beginPath(); c.moveTo(x+8*s, y+13*s); c.lineTo(x+22*s, y+13*s); c.stroke();
  // ほっぺ
  c.globalAlpha = 0.3;
  c.fillStyle = '#D07040';
  c.beginPath(); c.ellipse(x-18*s, y+10*s, 7*s, 4*s, 0, 0, Math.PI*2); c.fill();
  c.beginPath(); c.ellipse(x+18*s, y+10*s, 7*s, 4*s, 0, 0, Math.PI*2); c.fill();
  c.globalAlpha = 1;
  // 蝶ネクタイ
  c.fillStyle = '#D4A050';
  c.beginPath(); c.moveTo(x-7*s, y+22*s); c.lineTo(x, y+26*s); c.lineTo(x+7*s, y+22*s); c.lineTo(x, y+18*s); c.closePath(); c.fill();
  c.fillStyle = '#C49040';
  c.beginPath(); c.ellipse(x, y+22*s, 3*s, 2.5*s, 0, 0, Math.PI*2); c.fill();
}

// ===== COLOR DATA + 豆知識 =====
// 豆知識は著作権に配慮しオリジナル文で記述
const TRIVIA = {
  // 和色名
  'さくら色':'平安時代から愛された桜の花のような淡いピンク。染色では紅染めで最も薄い色調🌸',
  'さんごいろ':'珊瑚の中でも装飾に珍重されたピンク系の珊瑚が由来。古くから絵の具の色名にも🪸',
  'こうばいいろ':'紅梅の花のような淡い赤みのピンク。平安貴族が冬から春にかけて愛した色🌸',
  'しゅいろ':'硫化水銀を原料とする人造朱。天子の朱印など権威の象徴として使われた朱肉の色🔴',
  'あかねいろ':'茜という植物の根で染めた深い赤。万葉集にも登場する日本最古の植物染料のひとつ❤️',
  'なすこん':'茄子の実のような黒に近い深い紫。染色の色名だが近世になって流行した色名🍆',
  'あやめいろ':'アヤメ科のハナアヤメの花の色。「あやめ」は文目（あやめ）という美しい模様から🌸',
  'ぼたんいろ':'牡丹の花のような紫みのある鮮やかなピンク。化学染料以前の伝統色名では唯一の華やかな赤紫🌺',
  'きなりいろ':'未加工のままの繊維の自然な色。素朴な自然志向の時代に生まれたとても新しい色名🤍',
  'ワインレッド':'赤ワインのような紫みの赤。英語では18世紀になってから使われるようになった色名🍷',
  'ボルドー':'フランスのボルドー産赤ワインの色。19世紀に国際的に広まった濃い赤の色名🍷',
  'ベビーピンク':'欧米で乳幼児服の標準色として定着したソフトなピンク。化粧品のカラーラインにも多い🍬',
  'れんがいろ':'赤レンガのような暗い黄赤。日本人がこの色名に親しんだのは明治の文明開化以降🧱',
  'くりいろ':'栗の実の表皮のような暗い灰みの赤茶。平安時代は「落栗（おちぐり）」という色名だった🌰',
  'やまぶきいろ':'山吹の花の鮮やかな黄色。平安文学では黄色の代表で、後に黄金の大判小判の形容にも🌼',
  'おうどいろ':'水酸化鉄を含む天然の泥土から作る絵の具の色。英語ではイエローオーカー🎨',
  'からしいろ':'練りからしのようなやや暗い黄色。カラシナの種を粉にして練ったもの。英語ではマスタード🌿',
  'うぐいすいろ':'鶯の羽毛のような暗い黄緑色。江戸時代から身近な鳥の羽の色として親しまれた🐦',
  'もえぎ':'春に芽吹く若葉のような黄緑色。平安時代以来、若々しさ・新鮮さを象徴してきた伝統色🌱',
  'わかたけいろ':'若い竹の茎の緑を表す色名。化学染料の時代以降に生まれた比較的新しい色名🎋',
  'まつばいろ':'松の葉のような暗い緑色。常緑の松は長寿の象徴で、正月飾りにも縁起よく使われる🌲',
  'せいじいろ':'唐時代の中国で作られた青磁器の色。平安時代に日本に伝わり「秘色（ひそく）」と呼ばれた🏺',
  'あさぎいろ':'青と緑の中間色。浅葱（あさぎ）の若芽のような色という意味の、明るい藍染めの色名💠',
  'そらいろ':'晴れた空を表す色名。古くから一般的な色名として知られる。英語ではスカイブルー☁️',
  'あいいろ':'藍染めの暗い青。神話の時代から人類最古の植物染料とされる藍が由来💙',
  'るりいろ':'古代インドや中国で珍重された青い宝石「瑠璃」の色。平安初期に生まれた色名。おそらくラピスラズリ💎',
  'かきつばたいろ':'アヤメ科のカキツバタの花の色。5〜6月に咲き、花汁で布を染めたことから「書きつけ花」とも🌸',
  'ききょういろ':'桔梗の花のような青紫色の伝統的な色名。旧暦の初秋の気配を感じさせる色名のひとつ🌿',
  'ぐんじょういろ':'群青は藍銅鉱を原料とする日本画の代表的な青色絵の具。青の集まりを意味する色名💙',
  // 外来色名
  'えめらるどぐりーん':'エメラルドの宝石のような緑色。19世紀半ばにクロームグリーンの絵の具の色名として定着🟢',
  'びりじあん':'フランス人ギネが1859年に特許を取得した水酸化クロームの絵の具の色名。ラテン語の緑から🎨',
  'たーこいずぶるー':'トルコ石として知られる宝石の青と緑の中間色。英語になったのは16世紀後半🔵',
  'まりんぶるー':'ヨーロッパ各国の水夫や海軍従事者が着用した藍染めの制服の色。19世紀初期に流行色に🌊',
  'しあん':'古代ギリシャ語で「暗い」を意味するcyanosが由来。印刷・カラーフィルムの減法混色の三原色のひとつ🖨️',
  'すかいぶるー':'18世紀になって定着した空の色を表す色名。16世紀まで空の色は英語でスカイやスカイカラーと呼ばれた☁️',
  'べびーぶるー':'欧米で乳幼児服の標準色として使われてきた色名。青は聖母マリアの色で子どもに着せたい願いが込められた👼',
  'こばるとぶるー':'コバルトアルミン酸塩を主成分とする青が1777年に発見された。印象派の画家たちが特に恩恵を受けた色💙',
  'ねいびーぶるー':'イギリス海軍の制服の濃い藍染めの青。日本では紺色の英語表記として19世紀から定着🚢',
  'うるとらまりんぶるー':'ラピスラズリを粉にした貴重な着色剤。「海の彼方から渡ってきた」という意味のウルトラマリンが色名に🌊',
  'ばいおれっと':'スミレ属の総称で、スミレの花の色を表す色名。ニュートンが虹の七色で最も波長が短い色と命名🌈',
  'もーぶ':'人類初の化学染料を発見したイギリスの化学者パーキンが発見した紫色の染料の色。フランス語でアオイの意味🔬',
  'らべんだー':'19世紀後半にできたラベンダーの花の色を表す色名。入浴時の香水に用いられたラテン語「洗う」が語源🌸',
  'ぱーぷる':'語源は古代ギリシャ語。英語のパープルは10世紀頃に生まれ、古代紫の貝殻「プルプラ貝」と関係💜',

let audioCtx=null, soundOn=true;
function getAC(){if(!audioCtx)audioCtx=new(window.AudioContext||window.webkitAudioContext)();return audioCtx;}
function tone(freq,type,dur,vol,delay){
  if(!soundOn)return;
  try{
    const ac=getAC();
    const o=ac.createOscillator(),g=ac.createGain();
    o.connect(g);g.connect(ac.destination);
    o.type=type; o.frequency.value=freq;
    const t=ac.currentTime+(delay||0);
    g.gain.setValueAtTime(vol||0.3,t);
    g.gain.linearRampToValueAtTime(0,t+dur);
    o.start(t);o.stop(t+dur+0.05);
  }catch(e){}
}

function lighten(hex,a){const n=parseInt(hex.replace('#',''),16);return`rgb(${Math.min(255,(n>>16)+a)},${Math.min(255,((n>>8)&255)+a)},${Math.min(255,(n&255)+a)})`;}
function contrast(hex){const n=parseInt(hex.replace('#',''),16);return(.299*(n>>16)+.587*((n>>8)&255)+.114*(n&255))>140?'#1A0A2E':'#fff';}
function rr(c,x,y,w,h,r){c.beginPath();c.moveTo(x+r,y);c.lineTo(x+w-r,y);c.arcTo(x+w,y,x+w,y+r,r);c.lineTo(x+w,y+h-r);c.arcTo(x+w,y+h,x+w-r,y+h,r);c.lineTo(x+r,y+h);c.arcTo(x,y+h,x,y+h-r,r);c.lineTo(x,y+r);c.arcTo(x,y,x+r,y,r);c.closePath();}

// ===== POOL =====
function buildPool(){
  let base = [...getColorPool()];
  // 未習得モード（有料版）：まだ撃ち落としていない色だけに絞る
  if(isPaidMode && unknownOnlyMode){
    const learned = getLearnedSet(selLevel);
    const unknown = base.filter(c => !learned.has(c.name));
    // 未習得が3色以上あればそれだけで、少なければ全色を使う
    base = unknown.length >= 3 ? unknown : base;
  }
  pool = base;
  for(let i=pool.length-1;i>0;i--){const j=Math.floor(Math.random()*(i+1));[pool[i],pool[j]]=[pool[j],pool[i]];}
}
function pickTarget(){
  if(!pool.length)buildPool();
  const c=pool.filter(c=>c.name!==(target&&target.name));
  target=c[Math.floor(Math.random()*c.length)]||pool[0];
  gameReady=true;
  // 漢字があれば「漢字（読み）」形式で表示
  const dispKanji = target.kanji || target.name;
  const isKatakanaTarget = /^[ァ-ヶーa-zA-Zａ-ｚＡ-Ｚ\s]+$/.test(dispKanji);
  const disp = (target.kanji && !isKatakanaTarget) ? `${target.kanji}（${target.name}）` : dispKanji;
  document.getElementById('target-name').textContent=disp;
  document.getElementById('swatch').style.background=target.hex;
}

const LANES=[50,130,210,290];
function getX(bw){const used=enemies.map(e=>e.x);const free=LANES.filter(lx=>used.every(ex=>Math.abs(ex-lx)>bw*.8));return free.length?free[Math.floor(Math.random()*free.length)]:LANES[Math.floor(Math.random()*LANES.length)];}
function spawnEnemy(){
  if(!target || !gameReady) return;
  const d=getDiff(score);
  const color=Math.random()<d.tr?target:(()=>{const o=pool.filter(c=>c.name!==target.name);return o.length?o[Math.floor(Math.random()*o.length)]:target;})();
  // 表示テキスト：漢字があれば漢字、なければname
  const dispMain = color.kanji || color.name;
  // dispMainがカタカナなら読みがな不要（例：バイオレット、カーマイン）
  const isKatakana = /^[ァ-ヶーa-zA-Zａ-ｚＡ-Ｚ\s]+$/.test(dispMain);
  const dispSub = (color.kanji && !isKatakana) ? color.name : null; // 読みがな（漢字の場合のみ）
  // ブロック幅はmainとsubの長い方に合わせる
  const nMain = dispMain.length;
  const nSub  = dispSub ? dispSub.length : 0;
  const n = Math.max(nMain, nSub);
  const fw = n<=3?72:n<=5?88:n<=7?106:n<=9?122:138;
  const fh = dispSub ? 38 : 30;
  const fs = nMain<=3?14:nMain<=5?13:nMain<=7?12:11;
  enemies.push({x:getX(fw),y:-40,color,speed:d.sb+Math.random()*d.sr,w:fw,h:fh,fs,dispMain,dispSub,wobble:Math.random()*Math.PI*2,ws:(Math.random()-.5)*.05});
}

function drawCarrot(c2){
  const x=c2.x+Math.sin(c2.wobble)*4, y=c2.y;
  const s=c2.size;
  ctx.save(); ctx.translate(x,y);
  // にんじん本体
  ctx.fillStyle='#FF8C00';
  ctx.beginPath();
  ctx.moveTo(0,-s*0.8);
  ctx.bezierCurveTo(s*0.5,-s*0.8,s*0.6,s*0.5,0,s);
  ctx.bezierCurveTo(-s*0.6,s*0.5,-s*0.5,-s*0.8,0,-s*0.8);
  ctx.fill();
  // 筋
  ctx.strokeStyle='rgba(255,140,0,0.5)'; ctx.lineWidth=1;
  ctx.beginPath(); ctx.moveTo(0,-s*0.6); ctx.lineTo(0,s*0.8); ctx.stroke();
  // 葉っぱ
  ctx.fillStyle='#44BB44';
  ctx.beginPath(); ctx.ellipse(-s*0.2,-s,s*0.12,s*0.4,0.3,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(0,-s*1.1,s*0.1,s*0.35,0,0,Math.PI*2); ctx.fill();
  ctx.beginPath(); ctx.ellipse(s*0.2,-s,s*0.12,s*0.4,-0.3,0,Math.PI*2); ctx.fill();
  // キラキラ
  ctx.fillStyle='rgba(255,255,200,0.8)';
  ctx.beginPath(); ctx.arc(-s*0.2,-s*0.2,2,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

function spawnPetal() {
  const cols = ['#F4A7B9','#e040fb','#FFB7D5','#FF88C2','#FFD6F0','#FFC0E0'];
  petals.push({
    x: Math.random() * W,
    y: -20,
    vy: 2 + Math.random() * 2,
    vx: (Math.random() - 0.5) * 1.5,
    rot: Math.random() * Math.PI * 2,
    rotV: (Math.random() - 0.5) * 0.15,
    size: 6 + Math.random() * 8,
    color: cols[Math.floor(Math.random() * cols.length)],
    life: 1,
  });
}

function drawPetal(p) {
  ctx.save();
  ctx.translate(p.x, p.y);
  ctx.rotate(p.rot);
  ctx.globalAlpha = p.life * 0.85;
  ctx.fillStyle = p.color;
  ctx.shadowBlur = 4; ctx.shadowColor = p.color;
  // 花びら形（楕円4枚）
  for (let i = 0; i < 4; i++) {
    ctx.save();
    ctx.rotate((Math.PI / 2) * i);
    ctx.beginPath();
    ctx.ellipse(0, -p.size * 0.6, p.size * 0.35, p.size * 0.6, 0, 0, Math.PI * 2);
    ctx.fill();
    ctx.restore();
  }
  // 中心
  ctx.fillStyle = '#FFE066';
  ctx.beginPath(); ctx.arc(0, 0, p.size * 0.25, 0, Math.PI * 2); ctx.fill();
  ctx.shadowBlur = 0;
  ctx.restore();
  ctx.globalAlpha = 1;
}

function activateSkill() {
  if (skillGauge < SKILL_MAX) return;
  skillGauge = 0;
  if (curChar === 'sakura') {
    // フラワーシャワー：3秒間お花が降り注ぎ、自動でターゲット撃破
    flowerShower = true;
    flowerTimer = FLOWER_DURATION;
    flowerAutoShootTimer = 0;
    flash('🌸 フラワーシャワー！', '#F4A7B9');
    tone(880,'sine',.08,.3); tone(1046,'sine',.1,.3,.08); tone(1318,'sine',.15,.3,.16);
  } else {
    // スロータイム：5秒間敵が半速
    skillActive = true; slowMode = true; skillTimer = SKILL_DURATION;
    flash('🍫 スロータイム！', '#C4884A');
    tone(400,'sine',.2,.3); tone(300,'sine',.3,.25,.15);
  }
  updateSkillUI();
}

// ===== SHOOT =====
function canShoot(){return state==='playing'&&!shootLocked&&cooldown<=0;}
function shoot(){
  if(!canShoot())return;
  if (curChar === 'sakura') {
    // さくら：ハート弾（2発同時・ピンク）
    bullets.push({x:pipiChar.x+10,y:pipiChar.y-26,vy:-14,r:6,type:'heart',col:'#F4A7B9'});
    bullets.push({x:pipiChar.x-6, y:pipiChar.y-20,vy:-14,r:6,type:'heart',col:'#e040fb'});
  } else {
    // ショコラ：星弾（1発・茶色・大きめ）
    bullets.push({x:pipiChar.x+12,y:pipiChar.y-26,vy:-16,r:7,type:'star',col:'#D4A050'});
  }
  sndShoot(); cooldown = 10;
}

function drawHeart(c, x, y, r, col) {
  c.fillStyle = col;
  c.shadowBlur = 8; c.shadowColor = col;
  c.beginPath();
  c.moveTo(x, y + r*0.8);
  c.bezierCurveTo(x - r*1.2, y - r*0.2, x - r*1.5, y - r*1.2, x, y - r*0.4);
  c.bezierCurveTo(x + r*1.5, y - r*1.2, x + r*1.2, y - r*0.2, x, y + r*0.8);
  c.fill(); c.shadowBlur = 0;
}

function drawStar(c, x, y, r, col) {
  c.fillStyle = col;
  c.shadowBlur = 10; c.shadowColor = col;
  c.beginPath();
  for (let i = 0; i < 5; i++) {
    const a = (Math.PI*2/5)*i - Math.PI/2;
    if(i===0) c.moveTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    else c.lineTo(x+Math.cos(a)*r, y+Math.sin(a)*r);
    c.lineTo(x+Math.cos(a+Math.PI/5)*r*.4, y+Math.sin(a+Math.PI/5)*r*.4);
  }
  c.closePath(); c.fill(); c.shadowBlur = 0;
}
function drawLives(){
  lctx.clearRect(0,0,lc.width,lc.height);
  const draw=curChar==='sakura'?drawSakura:drawChocolat;
  for(let i=0;i<3;i++){lctx.globalAlpha=i<lives?1:.22;draw(lctx,12+i*24,12,22);}
  lctx.globalAlpha=1;
}

// ===== DRAW =====
function drawStars(){stars.forEach(s=>{ctx.globalAlpha=(.6+.4*Math.sin(frameN*s.s*.05))*.7;ctx.fillStyle='#fff';ctx.beginPath();ctx.arc(s.x,s.y,s.r,0,Math.PI*2);ctx.fill();});ctx.globalAlpha=1;}

function drawChar(x,y,size){
  const draw=curChar==='sakura'?drawSakura:drawChocolat;
  draw(ctx,x,y-size*.4,size);
  // 杖
  ctx.strokeStyle='#9B6FD4';ctx.lineWidth=3;ctx.lineCap='round';
  ctx.beginPath();ctx.moveTo(x+size*.12,y-size*.46);ctx.lineTo(x+size*.36,y-size*.72);ctx.stroke();
  const wx=x+size*.36,wy=y-size*.72;
  ctx.fillStyle='#FFE066';ctx.beginPath();
  for(let i=0;i<5;i++){const a=(Math.PI*2/5)*i-Math.PI/2+Math.sin(frameN*.1)*.2;if(i===0)ctx.moveTo(wx+Math.cos(a)*5,wy+Math.sin(a)*5);else ctx.lineTo(wx+Math.cos(a)*5,wy+Math.sin(a)*5);ctx.lineTo(wx+Math.cos(a+Math.PI/5)*2,wy+Math.sin(a+Math.PI/5)*2);}
  ctx.closePath();ctx.fill();
}

function drawEnemy(e){
  const wx=e.x+Math.sin(e.wobble)*5,y=e.y;
  const grad=ctx.createLinearGradient(wx-e.w/2,y-e.h/2,wx+e.w/2,y+e.h/2);
  grad.addColorStop(0,lighten(e.color.hex,30));grad.addColorStop(1,e.color.hex);
  ctx.fillStyle=grad; rr(ctx,wx-e.w/2,y-e.h/2,e.w,e.h,12); ctx.fill();
  ctx.strokeStyle='rgba(255,255,255,.15)';ctx.lineWidth=1;ctx.stroke();
  const tc=contrast(e.color.hex);
  if(e.dispSub){
    // 漢字（大）＋読み（小）の2行
    ctx.fillStyle=tc;
    ctx.font=`bold ${e.fs+1}px 'Hiragino Maru Gothic Pro',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(e.dispMain,wx,y-7);
    ctx.font=`${e.fs-2}px 'Hiragino Maru Gothic Pro',sans-serif`;
    ctx.globalAlpha=0.75;
    ctx.fillText(e.dispSub,wx,y+9);
    ctx.globalAlpha=1;
  } else {
    ctx.fillStyle=tc;
    ctx.font=`bold ${e.fs}px 'Hiragino Maru Gothic Pro',sans-serif`;
    ctx.textAlign='center';ctx.textBaseline='middle';
    ctx.fillText(e.dispMain,wx,y);
  }
}

// ===== UPDATE =====
function update(){
  if(state!=='playing')return;
  frameN++;
  pipiChar.x+=(pipiChar.tx-pipiChar.x)*.15;
  if(cooldown>0)cooldown--;
  // フラワーシャワー処理
  if(flowerShower){
    flowerTimer--;
    // 花びらを大量生成
    if(frameN % 3 === 0) spawnPetal();
    // 一定間隔で画面上の全ての色を自動撃破（ターゲット関係なく全部得点）
    flowerAutoShootTimer++;
    if(flowerAutoShootTimer >= 18){
      flowerAutoShootTimer = 0;
      if(enemies.length > 0){
        const e = enemies[0];
        spawnP(e.x, e.y, '#F4A7B9', 20);
        score += 10;
        if(!hitColors.find(h=>h.name===e.color.name)) hitColors.push({name:e.color.name,kanji:e.color.kanji,hex:e.color.hex});
        enemies.splice(0,1);
        tone(880,'sine',.05,.2); tone(1046,'sine',.06,.2,.05);
      }
    }
    // 花びら更新
    petals.forEach(p=>{ p.x+=p.vx; p.y+=p.vy; p.rot+=p.rotV; p.life-=0.008; });
    petals=petals.filter(p=>p.life>0&&p.y<H+30);
    if(flowerTimer<=0){
      flowerShower=false; petals=[];
      pickTarget(); // シャワー後にターゲットを更新
      updateSkillUI();
    }
  }
  // スキルタイマー（ショコラ・スロータイム）
  if(skillActive && skillTimer > 0) {
    skillTimer--;
    if(skillTimer <= 0) { skillActive=false; slowMode=false; updateSkillUI(); }
  }
  const d=getDiff(score);
  if(d.lv!==prevLv){
    prevLv=d.lv;curLv=d.lv;
    document.getElementById('diff-badge').textContent=d.label;
    document.getElementById('diff-badge').style.background=d.col;
    spawnI=d.si;
    if(d.lv>1){sndLvup();showLvup(d.label);}
  }
  spawnT++;if(spawnT>=spawnI){spawnEnemy();spawnT=0;}

  // にんじんスポーン（ぴぴ専用・一定間隔）
  if(curChar==='pipi'){
    carrotSpawnTimer++;
    if(carrotSpawnTimer>=CARROT_INTERVAL){spawnCarrot();carrotSpawnTimer=0;}
    // にんじん移動
    carrots.forEach(c2=>{c2.y+=c2.vy;c2.wobble+=0.06;});
    carrots=carrots.filter(c2=>c2.y<H+30);
    // 弾とにんじんの当たり判定
    for(let bi=bullets.length-1;bi>=0;bi--){
      const b=bullets[bi];
      for(let ci=carrots.length-1;ci>=0;ci--){
        const c2=carrots[ci];
        const cx=c2.x+Math.sin(c2.wobble)*4;
        if(Math.abs(b.x-cx)<c2.size&&Math.abs(b.y-c2.y)<c2.size*1.5){
          bullets.splice(bi,1);
          carrots.splice(ci,1);
          carrotCount++;
          spawnP(cx,c2.y,'#FF8C00',10);
          if(carrotCount>=3){
            carrotCount=0;
            lives=Math.min(lives+1,5); // 最大5ライフ
            flash('🥕🥕🥕 ライフ+1！','#FF8C00');
            tone(523,'sine',.08,.3);tone(659,'sine',.08,.3,.08);tone(784,'sine',.1,.3,.16);tone(1046,'sine',.15,.3,.24);
            drawLives();
          } else {
            flash(`🥕 ×${carrotCount}`,'#FF8C00');
            tone(660,'sine',.1,.25);
          }
          drawCarrotHUD();
          break;
        }
      }
    }
    drawCarrotHUD();
  }
  bullets.forEach(b=>b.y+=b.vy);
  bullets=bullets.filter(b=>b.y>-20);
  enemies.forEach(e=>{e.y+=e.speed*((slowMode||triviaT>0)?0.25:1);e.wobble+=e.ws;});
  // hit
  for(let bi=bullets.length-1;bi>=0;bi--){
    const b=bullets[bi];
    for(let ei=enemies.length-1;ei>=0;ei--){
      const e=enemies[ei];
      if(Math.abs(b.x-e.x)<e.w/2&&Math.abs(b.y-e.y)<e.h/2){
        bullets.splice(bi,1);
        if(flowerShower){
          // フラワーシャワー中は全色得点・ペナルティなし
          score+=10;
          if(!hitColors.find(h=>h.name===e.color.name)) hitColors.push({name:e.color.name,kanji:e.color.kanji,hex:e.color.hex});
          spawnP(e.x,e.y,'#F4A7B9',16);
          flash('+10 🌸','#F4A7B9');
          sndHit();
          enemies.splice(ei,1);
        } else if(target&&e.color.name===target.name){
          combo++;const gain=10*Math.min(combo,5);score+=gain;
          // 撃ち落とした色を記録（重複なし）
          if(!hitColors.find(h=>h.name===e.color.name)) hitColors.push({name:e.color.name,kanji:e.color.kanji,hex:e.color.hex});
          spawnP(e.x,e.y,e.color.hex,16);
          flash(`+${gain}${combo>1?'　🔥×'+combo:'　✨'}`,'#FFE066');
          // 豆知識
          const tv=TRIVIA[e.color.name];
          if(tv){
            triviaMsg=tv; triviaT=triviaTotal=150;
            triviaColor=e.color.hex; triviaName=e.color.kanji || e.color.name;
            triviaTextCol=contrast(e.color.hex);
          }
          sndHit();if(combo>1)sndCombo(combo);
          // スキルゲージ上昇
          skillGauge = Math.min(SKILL_MAX, skillGauge + (curChar==='sakura'?12:18));
          // ショコラ：コンボ5でゲージ満タン
          if(curChar==='pipi' && combo>=5) skillGauge = SKILL_MAX;
          updateSkillUI();
          enemies.splice(ei,1);setTimeout(pickTarget,180);
        }else{
          combo=0;lives--;spawnP(e.x,e.y,'#FF4466',12);
          flash('ちがう色！💦','#FF88AA');sndMiss();
          // ミスでゲージ少し減る
          skillGauge = Math.max(0, skillGauge - 20); updateSkillUI();
          enemies.splice(ei,1);drawLives();
          if(lives<=0){endGame();return;}
        }
        break;
      }
    }
  }
  // off screen
  for(let ei=enemies.length-1;ei>=0;ei--){
    const e=enemies[ei];
    if(e.y>H+30){
      if(target&&e.color.name===target.name){
        combo=0;lives--;flash('のがした！','#FF88AA');sndMiss();drawLives();
        if(lives<=0){endGame();return;}pickTarget();
      }
      enemies.splice(ei,1);
    }
  }
  particles.forEach(p=>{p.x+=p.vx;p.y+=p.vy;p.vy+=.1;p.life-=p.decay;});
  particles=particles.filter(p=>p.life>0);
  if(flashT>0)flashT--;
  if(triviaT>0)triviaT--;
  document.getElementById('score-val').textContent=score;
}

function flash(txt,col){flashMsg={txt,col};flashT=40;}
function showLvup(label){
  const el=document.getElementById('lvup');
  el.textContent=`⬆️ ${label} レベルアップ！`;el.style.opacity='1';
  setTimeout(()=>el.style.opacity='0',2000);
}

function render(){
  ctx.clearRect(0,0,W,H);
  const bg=ctx.createLinearGradient(0,0,0,H);bg.addColorStop(0,'#1a0a2e');bg.addColorStop(.5,'#2d1b5e');bg.addColorStop(1,'#1a0a2e');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  drawStars();
  if(state==='playing'){
    particles.forEach(p=>{ctx.globalAlpha=p.life;ctx.fillStyle=p.color;ctx.beginPath();ctx.arc(p.x,p.y,p.r*p.life,0,Math.PI*2);ctx.fill();ctx.globalAlpha=1;});
    enemies.forEach(drawEnemy);
    // にんじん描画（ぴぴ専用）
    if(curChar==='pipi') carrots.forEach(drawCarrot);
    bullets.forEach(b=>{
      if(b.type==='heart') drawHeart(ctx,b.x,b.y,b.r,b.col);
      else if(b.type==='star') drawStar(ctx,b.x,b.y,b.r,b.col);
      else { ctx.fillStyle='#FFE066';ctx.shadowBlur=10;ctx.shadowColor='#E040FB';ctx.beginPath();ctx.arc(b.x,b.y,b.r,0,Math.PI*2);ctx.fill();ctx.shadowBlur=0; }
    });
    drawChar(pipiChar.x,pipiChar.y,52);
    // フラワーシャワー演出
    if(flowerShower){
      ctx.globalAlpha=0.06+0.03*Math.sin(frameN*.15);
      ctx.fillStyle='#F4A7B9';
      ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=1;
      petals.forEach(drawPetal);
      // SKILL発動テキスト
      ctx.globalAlpha=0.7+0.3*Math.sin(frameN*.2);
      ctx.font='bold 14px Hiragino Maru Gothic Pro,sans-serif';
      ctx.fillStyle='#FF88C2';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText('🌸 フラワーシャワー中！', W/2, 30);
      ctx.globalAlpha=1;
    }
    if(slowMode){
      ctx.globalAlpha=0.08+0.04*Math.sin(frameN*.1);
      ctx.fillStyle='#88CCFF';
      ctx.fillRect(0,0,W,H);
      ctx.globalAlpha=1;
    }
    if(flashT>0&&flashMsg){ctx.globalAlpha=flashT/40;ctx.font='bold 19px Hiragino Maru Gothic Pro,sans-serif';ctx.fillStyle=flashMsg.col;ctx.textAlign='center';ctx.textBaseline='middle';ctx.fillText(flashMsg.txt,W/2,H/2-120);ctx.globalAlpha=1;}
    // 豆知識カード（画面中央に大きく）
    if(triviaT>0&&triviaMsg&&triviaColor){
      const fadeIn=100, fadeOut=20;
      const alpha = triviaT>triviaTotal-fadeIn
        ? (triviaTotal-triviaT)/fadeIn
        : triviaT<fadeOut ? triviaT/fadeOut : 1;
      ctx.globalAlpha=alpha;

      const cx=W/2, cy=H/2;
      const cw=W-40;

      // 説明文の行数を先に計算してカード高さを決定
      ctx.font='14px Hiragino Maru Gothic Pro,sans-serif';
      const maxW=cw-36;
      const lines=[];
      let line='';
      for(const ch2 of triviaMsg){
        const test=line+ch2;
        if(ctx.measureText(test).width>maxW){lines.push(line);line=ch2;}
        else line=test;
      }
      if(line)lines.push(line);
      const lineH=22;
      const ch=Math.max(170, 100 + lines.length*lineH + 20);

      // 暗いオーバーレイ
      ctx.fillStyle='rgba(10,5,20,0.72)';
      ctx.fillRect(0,0,W,H);

      // カード背景
      ctx.shadowBlur=24; ctx.shadowColor=triviaColor;
      ctx.fillStyle='rgba(22,12,44,0.96)';
      rr(ctx,cx-cw/2,cy-ch/2,cw,ch,20); ctx.fill();
      ctx.shadowBlur=0;

      // カードの上部：色のスウォッチ帯
      ctx.fillStyle=triviaColor;
      rr(ctx,cx-cw/2,cy-ch/2,cw,56,20); ctx.fill();
      // 下角を四角に揃える
      ctx.fillRect(cx-cw/2,cy-ch/2+36,cw,20);

      // 色名（大きく）
      ctx.fillStyle=triviaTextCol;
      ctx.font='bold 26px Hiragino Maru Gothic Pro,sans-serif';
      ctx.textAlign='center'; ctx.textBaseline='middle';
      ctx.fillText(triviaName, cx, cy-ch/2+28);

      // 仕切り線
      ctx.strokeStyle='rgba(255,255,255,0.15)'; ctx.lineWidth=1;
      ctx.beginPath(); ctx.moveTo(cx-cw/2+16,cy-ch/2+60); ctx.lineTo(cx+cw/2-16,cy-ch/2+60); ctx.stroke();

      // 📖 豆知識ラベル
      ctx.fillStyle='#FFE066';
      ctx.font='bold 11px Hiragino Maru Gothic Pro,sans-serif';
      ctx.fillText('📖 豆知識', cx, cy-ch/2+76);

      // 説明文（折り返し・事前計算済み）
      ctx.fillStyle='#F0E8FF';
      ctx.font='14px Hiragino Maru Gothic Pro,sans-serif';
      const startY=cy-ch/2+100;
      lines.forEach((l,i)=>ctx.fillText(l,cx,startY+i*lineH));

      ctx.globalAlpha=1;
    }
  }
}

function makeCharBtn(id,label,drawFn){
  const btn=document.createElement('button');
  btn.className='cbtn'+(id===curChar?' on':'');
  btn.id='cb-'+id;
  const c=document.createElement('canvas');c.width=48;c.height=48;
  const cx2=c.getContext('2d');drawFn(cx2,24,24,48);
  btn.appendChild(c);
  const sp=document.createElement('span');sp.textContent=label;btn.appendChild(sp);
  btn.addEventListener('click',()=>{
    if(id==='pipi'){ 
      if(isPaidMode){ 
        // 既に解放済みなら普通にキャラ変更
        curChar=id;
        document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('on'));
        btn.classList.add('on');
        drawLives(); updateSkillUI();
      } else {
        showPipiNotice(); 
      }
      return; 
    }
    curChar=id;
    document.querySelectorAll('.cbtn').forEach(b=>b.classList.remove('on'));
    btn.classList.add('on');
    drawLives(); updateSkillUI();
  });
  return btn;
}

function el(tag,props,text){const e=document.createElement(tag);if(props)Object.entries(props).forEach(([k,v])=>{if(k==='style')Object.assign(e.style,v);else e[k]=v;});if(text)e.textContent=text;return e;}

// ===== PROGRESS SYSTEM =====
// localStorage に級別の撃ち落とし済み色名を永続保存
const PROGRESS_KEY = 'iromato_progress_v1';

function loadProgress() {
  try {
    return JSON.parse(localStorage.getItem(PROGRESS_KEY) || '{}');
  } catch(e) { return {}; }
}
function saveProgress(grade, names) {
  try {
    const p = loadProgress();
    if (!p[grade]) p[grade] = [];
    names.forEach(n => { if (!p[grade].includes(n)) p[grade].push(n); });
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
  } catch(e) {}
}
function getProgressCount(grade) {
  const p = loadProgress();
  return (p[grade] || []).length;
}
function getLearnedSet(grade) {
  const p = loadProgress();
  return new Set(p[grade] || []);
}
function clearProgress(grade) {
  try {
    const p = loadProgress();
    p[grade] = [];
    localStorage.setItem(PROGRESS_KEY, JSON.stringify(p));
  } catch(e) {}
}

}
